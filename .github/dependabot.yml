version: 2
updates:
  # npm/yarn dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Zagreb
    open-pull-requests-limit: 10
    groups:
      # Batch all non-major updates together to reduce PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major version bumps need manual review
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Zagreb
    groups:
      actions:
        patterns:
          - '*'
