name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download GTFS data
        run: curl -L https://www.zet.hr/gtfs-scheduled/latest -o gtfs.zip

      - name: Extract GTFS data
        run: unzip -o gtfs.zip -d data/

      - name: Process GTFS data
        run: bash scripts/run.sh

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        env:
          GITHUB_PAGES: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_GTFS_PROXY_URL: ${{ secrets.VITE_GTFS_PROXY_URL }}
          VITE_GTFS_API_KEY: ${{ secrets.VITE_GTFS_API_KEY }}
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
