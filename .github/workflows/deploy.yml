name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      force_gtfs:
        description: 'Force re-download and re-process GTFS data (ignore cache)'
        type: boolean
        default: false
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download GTFS data
        run: curl -L https://www.zet.hr/gtfs-scheduled/latest -o gtfs.zip

      - name: Compute GTFS hash
        id: gtfs-hash
        run: echo "hash=$(sha256sum gtfs.zip | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Restore processed GTFS cache
        id: gtfs-cache
        if: ${{ !inputs.force_gtfs }}
        uses: actions/cache@v4
        with:
          path: public/data
          key: gtfs-processed-${{ steps.gtfs-hash.outputs.hash }}

      - name: Extract GTFS data
        if: steps.gtfs-cache.outputs.cache-hit != 'true'
        run: unzip -o gtfs.zip -d data/

      - name: Process GTFS data
        if: steps.gtfs-cache.outputs.cache-hit != 'true'
        run: bash scripts/run.sh

      - name: Download HZPP train GTFS data
        run: curl -L https://www.hzpp.hr/GTFS_files.zip -o gtfs-train.zip

      - name: Compute train GTFS hash
        id: gtfs-train-hash
        run: echo "hash=$(sha256sum gtfs-train.zip | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Restore processed train GTFS cache
        id: gtfs-train-cache
        if: ${{ !inputs.force_gtfs }}
        uses: actions/cache@v4
        with:
          path: public/data-train
          key: gtfs-train-processed-${{ steps.gtfs-train-hash.outputs.hash }}

      - name: Extract train GTFS data
        if: steps.gtfs-train-cache.outputs.cache-hit != 'true'
        run: unzip -o gtfs-train.zip -d data-train/

      - name: Process train GTFS data
        if: steps.gtfs-train-cache.outputs.cache-hit != 'true'
        run: bash scripts/run_train.sh

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        env:
          GITHUB_PAGES: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_GTFS_PROXY_URL: ${{ secrets.VITE_GTFS_PROXY_URL }}
          VITE_GTFS_API_KEY: ${{ secrets.VITE_GTFS_API_KEY }}
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
