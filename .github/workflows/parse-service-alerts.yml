name: Parse ZET Service Alerts

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # needed to commit updated service-alerts.json

concurrency:
  group: parse-service-alerts
  cancel-in-progress: true

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the commit push works
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch, parse, and save alerts
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node scripts/parse-service-alerts.mjs

      - name: Commit updated alerts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/service-alerts.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update service alerts [skip ci]" && git push
