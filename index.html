<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZET Live — Zagreb javni prijevoz</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Live tracking of Zagreb public transport" />
    
    <!-- Apple-specific PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ZET Live" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    
    <script>
      // Initialize theme before React loads to prevent flash
      (function() {
        const theme = (() => {
          const localStorageTheme = localStorage?.getItem("theme") ?? "";
          if (["dark", "light"].includes(localStorageTheme)) {
            return localStorageTheme;
          }
          if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            return "dark";
          }
          return "light";
        })();
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
